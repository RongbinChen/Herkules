server {
    listen 80;
    server_name www.herkulesgroup-china.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name www.herkulesgroup-china.com;

    ssl_certificate /etc/nginx/certs/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/privkey.pem;
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:10m;
    ssl_session_tickets off;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers off;

    client_max_body_size 25m;

    # 静态页面
    location = /potential-offices {
        alias /home/ubuntu/calendar-app/proxy/static/potential-offices.html;
        default_type text/html;
    }
    location = /potential-offices/ {
        return 301 /potential-offices;
    }
    location = /potential-offices/chaoyang-boundary.geojson {
        alias /home/ubuntu/calendar-app/proxy/static/chaoyang-boundary.geojson;
        default_type application/geo+json;
    }

    # /test/* 转发（保持原样）
    location = /test {
        return 301 /test/;
    }
    location /test/api/ {
        proxy_pass http://127.0.0.1:8000/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }
    location /test/ {
        proxy_pass http://127.0.0.1:5050/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # 后端 API 转发
    # Public share pages -> backend injects per-record OG meta (WeChat link cards)
    location ~ ^/(bidopen|trip)/share/ {
        proxy_pass http://127.0.0.1:3001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /api/ {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }

    # 前端静态文件
    location / {
        root /var/www/herkulesgroup;
        try_files $uri $uri/ /index.html;
    }
}
