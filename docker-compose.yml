version: '3.8'

services:
  proxy:
    image: nginx:alpine
    container_name: calendar-proxy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./proxy/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./proxy/static:/usr/share/nginx/html/static:ro
      - ./proxy/certs:/etc/nginx/certs:ro
    depends_on:
      - frontend

  postgres:
    image: postgres:15-alpine
    container_name: calendar-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres123
      POSTGRES_DB: calendar_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: calendar-backend
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      DATABASE_URL: postgresql://postgres:postgres123@postgres:5432/calendar_db
      JWT_SECRET: your-super-secret-jwt-key-change-in-production
      JWT_EXPIRES_IN: 30d
      PORT: 3001
      CHINABIDDING_BASE_URL: ${CHINABIDDING_BASE_URL:-https://www.chinabidding.com/en}
      CHINABIDDING_CAS_LOGIN_URL: ${CHINABIDDING_CAS_LOGIN_URL:-https://cas.ebnew.com/cas/login}
      CHINABIDDING_USERNAME: ${CHINABIDDING_USERNAME:-}
      CHINABIDDING_PASSWORD: ${CHINABIDDING_PASSWORD:-}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - /app/node_modules

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: calendar-frontend
    restart: unless-stopped
    expose:
      - "5000"
    environment:
      VITE_API_URL: ""
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend

volumes:
  postgres_data:
